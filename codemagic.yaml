workflows:
  ios-capacitor-release:
    name: iOS Capacitor Release
    instance_type: mac_mini_m1
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.litebite.smartcommunity
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APP_ID: 6757442049
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'ios-v*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      
      - name: Build web app
        script: |
          npm run build
      
      - name: Add and sync Capacitor iOS
        script: |
          npx cap add ios
          npx cap sync ios
      
      - name: Set iOS bundle identifier
        script: |
          cd ios/App

          # Fix bundle identifier
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = com.smartcommunity.app/PRODUCT_BUNDLE_IDENTIFIER = com.litebite.smartcommunity/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/com.smartcommunity.app/com.litebite.smartcommunity/g" App/Info.plist

          # Set export compliance to avoid manual compliance prompt on each build
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist 2>/dev/null || true

          # Ensure device display name matches App Store name
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Lite Bite" App/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Lite Bite" App/Info.plist

          # Set app icon from Logo.png (flatten alpha, generate all required sizes)
          ICON_SET="App/Assets.xcassets/AppIcon.appiconset"
          python3 << 'PYEOF'
          from PIL import Image
          import os
          icon = Image.open('../../public/Logo.png').convert('RGBA')
          bg = Image.new('RGBA', icon.size, (255, 255, 255, 255))
          bg.paste(icon, (0, 0), icon)
          bg = bg.convert('RGB')
          sizes = [20, 29, 40, 58, 60, 76, 80, 87, 120, 152, 167, 180, 1024]
          out = os.environ.get('ICON_SET', 'App/Assets.xcassets/AppIcon.appiconset')
          for s in sizes:
              bg.resize((s, s), Image.LANCZOS).save(f'{out}/AppIcon-{s}.png')
          PYEOF

          # Add CFBundleIconName to Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" App/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" App/Info.plist

          cat > "$ICON_SET/Contents.json" << 'ICONJSON'
          {
            "images": [
              { "filename": "AppIcon-40.png", "idiom": "iphone", "scale": "2x", "size": "20x20" },
              { "filename": "AppIcon-60.png", "idiom": "iphone", "scale": "3x", "size": "20x20" },
              { "filename": "AppIcon-58.png", "idiom": "iphone", "scale": "2x", "size": "29x29" },
              { "filename": "AppIcon-87.png", "idiom": "iphone", "scale": "3x", "size": "29x29" },
              { "filename": "AppIcon-80.png", "idiom": "iphone", "scale": "2x", "size": "40x40" },
              { "filename": "AppIcon-120.png", "idiom": "iphone", "scale": "3x", "size": "40x40" },
              { "filename": "AppIcon-120.png", "idiom": "iphone", "scale": "2x", "size": "60x60" },
              { "filename": "AppIcon-180.png", "idiom": "iphone", "scale": "3x", "size": "60x60" },
              { "filename": "AppIcon-20.png", "idiom": "ipad", "scale": "1x", "size": "20x20" },
              { "filename": "AppIcon-40.png", "idiom": "ipad", "scale": "2x", "size": "20x20" },
              { "filename": "AppIcon-29.png", "idiom": "ipad", "scale": "1x", "size": "29x29" },
              { "filename": "AppIcon-58.png", "idiom": "ipad", "scale": "2x", "size": "29x29" },
              { "filename": "AppIcon-40.png", "idiom": "ipad", "scale": "1x", "size": "40x40" },
              { "filename": "AppIcon-80.png", "idiom": "ipad", "scale": "2x", "size": "40x40" },
              { "filename": "AppIcon-76.png", "idiom": "ipad", "scale": "1x", "size": "76x76" },
              { "filename": "AppIcon-152.png", "idiom": "ipad", "scale": "2x", "size": "76x76" },
              { "filename": "AppIcon-167.png", "idiom": "ipad", "scale": "2x", "size": "83.5x83.5" },
              { "filename": "AppIcon-1024.png", "idiom": "ios-marketing", "scale": "1x", "size": "1024x1024" }
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          ICONJSON
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "0")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      
      - name: Build ipa for distribution
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - bitelite260@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  ios-capacitor-debug:
    name: iOS Debug Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'develop'
          include: true
        - pattern: 'feature/*'
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci
      
      - name: Build web app
        script: |
          npm run build
      
      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      
      - name: Build iOS (Debug - No signing)
        script: |
          cd ios/App
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            build
    artifacts:
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - bitelite260@gmail.com
        notify:
          success: false
          failure: true


















